<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday — Dark Knight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Cinzel:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    /* ─── TOKENS ──────────────────────────────────────────── */
    :root {
      --black:   #06060a;
      --dark:    #0d0b12;
      --yellow:  #f5c200;
      --yellow2: #ffd740;
      --amber:   #c98a00;
      --smoke:   rgba(245,194,0,0.08);
      --sky1:    #0a080f;
      --sky2:    #130f1c;
    }

    /* ─── RESET ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }

    body {
      background: var(--black);
      font-family: 'Cinzel', serif;
      color: var(--yellow);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
    }

    /* ─── BACKGROUND GRADIENT SKY ─────────────────────────── */
    .sky {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 0%, #1a1228 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 70% 10%, #1e1408 0%, transparent 50%),
        linear-gradient(180deg, #0a0810 0%, #06050c 60%, #080610 100%);
      z-index: 0;
    }

    /* ─── RAIN ────────────────────────────────────────────── */
    .rain-canvas {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0.18;
    }

    /* ─── BAT SIGNAL ──────────────────────────────────────── */
    .bat-signal {
      position: fixed;
      top: -10vh;
      left: 50%;
      transform: translateX(-50%);
      width: min(420px, 90vw);
      height: min(420px, 90vw);
      z-index: 2;
      opacity: 0;
      animation: signalFade 1.2s ease-out 0.4s forwards;
    }

    @keyframes signalFade {
      to { opacity: 1; top: -5vh; }
    }

    .signal-beam {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(ellipse 70% 70% at 50% 50%,
        rgba(245,194,0,0.22) 0%,
        rgba(245,194,0,0.08) 40%,
        transparent 72%);
      animation: pulse 3s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { transform: scale(1);   opacity: 1; }
      to   { transform: scale(1.1); opacity: 0.7; }
    }

    .signal-rays {
      position: absolute;
      inset: 0;
      background: conic-gradient(
        from 0deg,
        transparent 0deg, rgba(245,194,0,0.04) 4deg, transparent 8deg,
        transparent 90deg, rgba(245,194,0,0.04) 94deg, transparent 98deg,
        transparent 180deg, rgba(245,194,0,0.04) 184deg, transparent 188deg,
        transparent 270deg, rgba(245,194,0,0.04) 274deg, transparent 278deg
      );
      border-radius: 50%;
      animation: rotate 20s linear infinite;
    }

    @keyframes rotate { to { transform: rotate(360deg); } }

    /* batman logo inside signal */
    .signal-logo {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ─── CITY SKYLINE ────────────────────────────────────── */
    .skyline {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      z-index: 3;
      pointer-events: none;
    }

    /* ─── BATMOBILE ───────────────────────────────────────── */
    .batmobile-wrap {
      position: fixed;
      bottom: 90px;
      left: -380px;
      z-index: 4;
      animation: driveIn 2.2s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
    }

    @keyframes driveIn {
      to { left: calc(50% - 200px); }
    }

    /* headlight beams */
    .headlights {
      position: absolute;
      top: 18px;
      right: -120px;
      width: 140px;
      height: 38px;
      background: linear-gradient(90deg,
        rgba(245,194,0,0.7) 0%,
        rgba(245,194,0,0.3) 40%,
        transparent 100%);
      clip-path: polygon(0 30%, 100% 0%, 100% 100%, 0 70%);
      filter: blur(3px);
      opacity: 0.85;
    }

    /* ─── FLOATING BATS ───────────────────────────────────── */
    .bats-layer {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
    }

    .bat {
      position: absolute;
      opacity: 0;
    }

    /* ─── HERO TEXT ───────────────────────────────────────── */
    .hero {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 0 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
    }

    .happy-line {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(2.2rem, 7vw, 5.8rem);
      font-weight: 900;
      letter-spacing: 0.18em;
      color: transparent;
      -webkit-text-stroke: 2px var(--yellow);
      text-shadow:
        0 0 30px rgba(245,194,0,0.4),
        0 0 80px rgba(245,194,0,0.15);
      opacity: 0;
      transform: translateY(40px) scale(0.9);
      animation: riseIn 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) 2.6s forwards;
    }

    .birthday-line {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(2.8rem, 9vw, 7.5rem);
      font-weight: 900;
      letter-spacing: 0.12em;
      background: linear-gradient(135deg, var(--yellow2) 0%, var(--yellow) 50%, var(--amber) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 0 20px rgba(245,194,0,0.6)) drop-shadow(0 0 60px rgba(245,194,0,0.25));
      opacity: 0;
      transform: translateY(50px) scale(0.85);
      animation: riseIn 1s cubic-bezier(0.34, 1.56, 0.64, 1) 3.1s forwards;
    }

    .name-line {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(4rem, 15vw, 12rem);
      letter-spacing: 0.08em;
      line-height: 1;
      color: var(--yellow);
      text-shadow:
        0 0 10px var(--yellow),
        0 0 30px rgba(245,194,0,0.7),
        0 0 80px rgba(245,194,0,0.4),
        0 0 160px rgba(245,194,0,0.15);
      opacity: 0;
      transform: scale(0.3) rotateX(40deg);
      animation: nameBoom 1.1s cubic-bezier(0.34, 1.56, 0.64, 1) 3.8s forwards;
    }

    @keyframes riseIn {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes nameBoom {
      0%   { opacity: 0; transform: scale(0.3) rotateX(40deg); filter: blur(12px); }
      60%  { opacity: 1; transform: scale(1.08) rotateX(-4deg); filter: blur(0); }
      100% { opacity: 1; transform: scale(1) rotateX(0deg); filter: blur(0); }
    }

    .name-glow-ring {
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      background: transparent;
      box-shadow: 0 0 0 0 rgba(245,194,0,0);
      animation: ringPulse 2s ease-out 4.4s infinite;
      pointer-events: none;
      z-index: -1;
    }

    @keyframes ringPulse {
      0%   { box-shadow: 0 0 0 0   rgba(245,194,0,0.5); }
      100% { box-shadow: 0 0 0 60px rgba(245,194,0,0); }
    }

    .divider {
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--yellow), transparent);
      opacity: 0;
      animation: lineExpand 0.8s ease-out 3.6s forwards;
    }

    @keyframes lineExpand {
      to { width: min(400px, 80vw); opacity: 0.6; }
    }

    .tagline {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.65rem, 1.8vw, 1rem);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(245,194,0,0.5);
      opacity: 0;
      animation: fadeSlide 1s ease-out 4.8s forwards;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── LIGHTNING ───────────────────────────────────────── */
    .lightning {
      position: fixed;
      inset: 0;
      z-index: 15;
      pointer-events: none;
      background: rgba(230,220,255,0.95);
      opacity: 0;
    }

    /* ─── PARTICLES ───────────────────────────────────────── */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 6;
      pointer-events: none;
    }

    /* ─── VIGNETTE ────────────────────────────────────────── */
    .vignette {
      position: fixed;
      inset: 0;
      z-index: 8;
      pointer-events: none;
      background: radial-gradient(ellipse 80% 80% at 50% 50%,
        transparent 40%, rgba(4,3,8,0.75) 100%);
    }

    /* ─── CORNER DECORATION ───────────────────────────────── */
    .corner {
      position: fixed;
      z-index: 9;
      width: 100px;
      height: 100px;
      opacity: 0.3;
      pointer-events: none;
    }
    .corner-tl { top: 0;    left: 0;  border-top: 2px solid var(--yellow); border-left:  2px solid var(--yellow); }
    .corner-tr { top: 0;    right: 0; border-top: 2px solid var(--yellow); border-right: 2px solid var(--yellow); }
    .corner-bl { bottom: 0; left: 0;  border-bottom: 2px solid var(--yellow); border-left:  2px solid var(--yellow); }
    .corner-br { bottom: 0; right: 0; border-bottom: 2px solid var(--yellow); border-right: 2px solid var(--yellow); }

    /* ─── NAME EDIT HINT ──────────────────────────────────── */
    .hint {
      position: fixed;
      bottom: 1rem;
      right: 1.2rem;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: rgba(245,194,0,0.2);
      z-index: 20;
      font-family: 'Cinzel', serif;
      text-transform: uppercase;
    }
  </style>
</head>

<script>
/* ─────────────────────────────────────────────────────────
   CONFIG — change this to the birthday person's name
   ───────────────────────────────────────────────────────── */
const BIRTHDAY_NAME = ""; // ← Replace with actual name

document.getElementById("nameText").textContent = BIRTHDAY_NAME;

/* ─── RAIN ─────────────────────────────────────────────── */
(function initRain() {
  const canvas = document.getElementById("rainCanvas");
  const ctx = canvas.getContext("2d");
  let drops = [];

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener("resize", resize);

  for (let i = 0; i < 200; i++) {
    drops.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      len:   8 + Math.random() * 14,
      speed: 6 + Math.random() * 10,
      opacity: 0.2 + Math.random() * 0.5,
    });
  }

  function drawRain() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drops.forEach(d => {
      ctx.beginPath();
      ctx.moveTo(d.x, d.y);
      ctx.lineTo(d.x - 1, d.y + d.len);
      ctx.strokeStyle = `rgba(180,160,80,${d.opacity})`;
      ctx.lineWidth = 0.7;
      ctx.stroke();
      d.y += d.speed;
      if (d.y > canvas.height) {
        d.y = -d.len;
        d.x = Math.random() * canvas.width;
      }
    });
    requestAnimationFrame(drawRain);
  }
  drawRain();
})();

/* ─── PARTICLES (golden sparks) ────────────────────────── */
(function initParticles() {
  const canvas = document.getElementById("particleCanvas");
  const ctx = canvas.getContext("2d");
  let sparks = [];

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener("resize", resize);

  function spawnSpark() {
    sparks.push({
      x:  Math.random() * canvas.width,
      y:  canvas.height + 10,
      vx: (Math.random() - 0.5) * 1.2,
      vy: -(1.5 + Math.random() * 3),
      size: 1 + Math.random() * 2.5,
      life: 1,
      decay: 0.006 + Math.random() * 0.008,
    });
  }

  setInterval(spawnSpark, 120);

  function drawSparks() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    sparks.forEach((s, i) => {
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(245,194,0,${s.life * 0.7})`;
      ctx.shadowBlur = 6;
      ctx.shadowColor = "#f5c200";
      ctx.fill();
      ctx.shadowBlur = 0;
      s.x += s.vx;
      s.y += s.vy;
      s.vy -= 0.02;
      s.life -= s.decay;
      if (s.life <= 0) sparks.splice(i, 1);
    });
    requestAnimationFrame(drawSparks);
  }
  drawSparks();
})();

/* ─── BATS ──────────────────────────────────────────────── */
(function initBats() {
  const layer = document.getElementById("batsLayer");

  const batSVG = `<svg viewBox="0 0 80 40" xmlns="http://www.w3.org/2000/svg">
    <path class="bat-wings" d="M40 18 C30 12 18 6 5 10 C12 14 16 20 14 26 C20 22 26 22 30 26 C26 30 24 36 26 40 C30 34 34 30 38 28 C38.5 26 39 24 40 22 C41 24 41.5 26 42 28 C46 30 50 34 54 40 C56 36 54 30 50 26 C54 22 60 22 66 26 C64 20 68 14 75 10 C62 6 50 12 40 18Z" fill="rgba(245,194,0,0.75)"/>
  </svg>`;

  function spawnBat() {
    const bat = document.createElement("div");
    bat.innerHTML = batSVG;
    const size = 30 + Math.random() * 50;
    const fromLeft = Math.random() > 0.5;
    const startX = fromLeft ? -size : window.innerWidth + size;
    const endX   = fromLeft ? window.innerWidth + size : -size;
    const y      = 5 + Math.random() * 55;
    const dur    = 4 + Math.random() * 5;
    const delay  = Math.random() * 2;

    bat.style.cssText = `
      position: absolute;
      width: ${size}px; height: ${size * 0.5}px;
      left: ${startX}px; top: ${y}%;
      opacity: 0;
      transition: none;
    `;

    layer.appendChild(bat);

    bat.animate([
      { left: startX + "px", top: y + "%", opacity: 0, transform: `scaleX(${fromLeft ? 1 : -1})` },
      { left: (startX + (endX - startX) * 0.1) + "px", opacity: 0.9, offset: 0.05 },
      { left: endX + "px", top: (y + (Math.random() - 0.5) * 15) + "%", opacity: 0.9,
        transform: `scaleX(${fromLeft ? 1 : -1})` },
    ], {
      duration: dur * 1000,
      delay: delay * 1000,
      easing: "linear",
      fill: "forwards",
    }).onfinish = () => bat.remove();

    /* wing flap on bat SVG */
    const wings = bat.querySelector(".bat-wings");
    if (wings) {
      wings.style.transformOrigin = "center";
      wings.animate([
        { transform: "scaleY(1)" },
        { transform: "scaleY(0.5)" },
        { transform: "scaleY(1)" },
      ], { duration: 300, iterations: Infinity });
    }
  }

  /* spawn 3 bats immediately, then keep spawning */
  setTimeout(spawnBat, 200);
  setTimeout(spawnBat, 600);
  setTimeout(spawnBat, 1200);
  setInterval(spawnBat, 1800);
})();

/* ─── LIGHTNING FLASH ───────────────────────────────────── */
(function initLightning() {
  const el = document.getElementById("lightning");

  function flash() {
    el.style.opacity = "0.06";
    setTimeout(() => { el.style.opacity = "0"; }, 80);
    setTimeout(() => { el.style.opacity = "0.04"; }, 120);
    setTimeout(() => { el.style.opacity = "0"; }, 180);
  }

  setTimeout(flash, 1800);
  setTimeout(flash, 4200);
  setInterval(() => {
    if (Math.random() > 0.65) flash();
  }, 5000 + Math.random() * 7000);
})();

/* ─── NAME BURST PARTICLES ──────────────────────────────── */
(function nameBurst() {
  const canvas = document.getElementById("particleCanvas");
  setTimeout(() => {
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight / 2;
    const ctx = canvas.getContext("2d");
    const burst = [];
    for (let i = 0; i < 60; i++) {
      const angle = (i / 60) * Math.PI * 2;
      const speed = 2 + Math.random() * 6;
      burst.push({
        x: cx, y: cy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        size: 1.5 + Math.random() * 3,
        life: 1,
        color: Math.random() > 0.5 ? "245,194,0" : "255,215,64",
      });
    }

    function animateBurst() {
      burst.forEach((p, i) => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${p.color},${p.life})`;
        ctx.shadowBlur = 8;
        ctx.shadowColor = "#f5c200";
        ctx.fill();
        ctx.shadowBlur = 0;
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.06;
        p.life -= 0.018;
        if (p.life <= 0) burst.splice(i, 1);
      });
      if (burst.length) requestAnimationFrame(animateBurst);
    }
    animateBurst();
  }, 4200); // fires when name appears
})();
</script>
